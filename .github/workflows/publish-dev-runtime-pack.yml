name: Publish dev Android runtime pack

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild and replace the pack for the current dev SHA"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "47 */2 * * *"

jobs:
  publish:
    uses: ./.github/workflows/_publish-channel-runtime-pack.yml
    with:
      channel: dev
      force: ${{ inputs.force || false }}
    secrets:
      RUNTIME_PACK_SIGNING_PRIVATE_KEY: ${{ secrets.RUNTIME_PACK_SIGNING_PRIVATE_KEY }}
