name: Publish stable Android runtime pack

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild and replace the pack for the current stable SHA"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 */2 * * *"

permissions:
  contents: write

jobs:
  publish:
    uses: ./.github/workflows/_publish-channel-runtime-pack.yml
    with:
      channel: stable
      force: ${{ inputs.force || false }}
    secrets:
      RUNTIME_PACK_SIGNING_PRIVATE_KEY: ${{ secrets.RUNTIME_PACK_SIGNING_PRIVATE_KEY }}
